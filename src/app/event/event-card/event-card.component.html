<div 
  (click)="onClick()"
  class="bg-white dark:bg-neutral-800
         border border-gray-200 dark:border-neutral-700
         shadow-sm dark:shadow-md
         hover:shadow-xl dark:hover:shadow-neutral-900/40
         transition
         p-6
         cursor-pointer
         rounded-xl">

  <!-- Title + Location -->
  <div class="flex justify-between items-start">
    
    <h2 class="text-xl font-bold text-gray-900 dark:text-white">
      {{ event.title }}
    </h2>

    <div class="flex items-center text-gray-500 dark:text-gray-400 text-sm">
      <span class="material-icons text-base mr-1">location_on</span>
      {{ event.cityName }}
    </div>

  </div>

  <!-- Description -->
  <p class="mt-3 text-gray-600 dark:text-gray-400 italic text-sm leading-relaxed">
    {{ event.description }}
  </p>

  <!-- Divider -->
  <div class="my-4 border-t border-gray-200 dark:border-neutral-700"></div>

  <!-- Bottom Row -->
  <div class="grid grid-cols-3 text-center text-sm">

    <!-- Category -->
    <div class="flex items-center justify-center space-x-2
                text-indigo-600 dark:text-indigo-400">
      <span class="material-icons text-lg">category</span>
      <span class="font-medium">{{ event.category }}</span>
    </div>

    <!-- Price -->
    <div class="flex items-center justify-center space-x-2
                text-green-600 dark:text-green-400">
      <span class="material-icons text-lg">currency_rupee</span>
      <span class="font-medium">
        ₹{{ getDiscountedPrice() }}
      </span>
    </div>

    <!-- Time -->
    <div class="flex items-center justify-center space-x-2
                text-orange-500 dark:text-orange-400">
      <span class="material-icons text-lg">schedule</span>
      <span class="font-medium">
        {{ event.startTime | date:'shortTime' }}
      </span>
    </div>

  </div>
</div>
